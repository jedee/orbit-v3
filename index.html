    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}

<body>
<div id="root"></div>
<button id="inst" onclick="doInstall()">⊕ Install Orbit — Works Offline</button>
<script>
  let _dp;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();_dp=e;
    const b=document.getElementById('inst');
    b.style.display='block';
    b.style.background=document.body.style.background==='rgb(0,0,0)'?'#fff':'#000';
    b.style.color=document.body.style.background==='rgb(0,0,0)'?'#000':'#fff';
  });
  window.addEventListener('appinstalled',()=>{document.getElementById('inst').style.display='none';});
  function doInstall(){if(_dp){_dp.prompt();_dp.userChoice.then(()=>{_dp=null;document.getElementById('inst').style.display='none';});}}
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>

// ── RING SVG ────────────────────────────────────────────────
function ConcentricRings({ goals, size = 240, animated = true }) {
  const active = goals.filter(g => g.active !== false).slice(0, 5);
  if (!active.length) return (
    <div style={{ width: size, height: size, borderRadius: "50%", background: "rgba(128,128,128,.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
      <span style={{ fontSize: 40 }}>⊙</span>
    </div>
  );
  const sw = 13, gap = 5;
  const outerR = size / 2 - sw - 2;
  const radii = active.map((_, i) => outerR - i * (sw + gap));
  const center = size / 2;
  const totalPct = active.reduce((s, g) => s + Math.min(g.progress / g.target * 100, 100), 0) / active.length;

  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ position: "absolute", inset: 0, overflow: "visible" }}>
        {active.map((goal, i) => {
          const r = radii[i];
          const circ = 2 * Math.PI * r;
          const pct = Math.min(goal.progress / goal.target * 100, 100);
          const offset = circ - pct / 100 * circ;
          const col = RC[goal.category]?.s || RC.custom.s;
          const tipAngle = (-90 + pct / 100 * 360) * Math.PI / 180;
          const tx = center + r * Math.cos(tipAngle);
          const ty = center + r * Math.sin(tipAngle);
          return (
            <g key={goal.id}>
              <circle cx={center} cy={center} r={r} fill="none" stroke={col} strokeOpacity=".18" strokeWidth={sw} />
              <circle cx={center} cy={center} r={r} fill="none" stroke={col} strokeWidth={sw} strokeLinecap="round"
                strokeDasharray={circ} strokeDashoffset={animated ? offset : circ}
                transform={`rotate(-90 ${center} ${center})`}
                style={{ transition: `stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1) ${i * .12}s`, filter: `drop-shadow(0 0 6px ${col}77)` }} />
              {pct > 2 && pct < 99.5 && <circle cx={tx} cy={ty} r={sw * .38} fill={col} style={{ filter: `drop-shadow(0 0 4px ${col})` }} />}
            </g>
          );
        })}
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
        <div style={{ fontFamily: "system-ui", fontWeight: 700, fontSize: size * .14, lineHeight: 1, letterSpacing: "-.02em" }}>{Math.round(totalPct)}%</div>
        <div style={{ fontSize: size * .055, opacity: .45, marginTop: 3 }}>complete</div>
      </div>
    </div>
  );
}

  const { dark, T } = useContext(ThemeCtx);
  const [step, setStep] = useState(0);
  const [d, setD] = useState({ name: "", gender: "", focus: [], income: "", profile: "", city: "" });

    d.name.trim().length >= 2 && !!d.gender,
    d.focus.length >= 1,
    !d.focus.includes("finance") || parseInt(d.income.replace(/,/g, "")) >= 500,
    !!d.profile,
    !!d.city,
  ];

  const next = () => {
    if (step === 4) {
      setBuilding(true);
      setTimeout(() => {
        const profile = { ...d, income: parseInt(d.income.replace(/,/g, "")) || 50000 };
        const goals = buildGoals(profile);
        const budget = buildBudget(profile);
        onComplete(profile, goals, budget);
      }, 1800);
      return;
    }
    if (step === 1 && !d.focus.includes("finance")) { setStep(3); return; }
    setStep(s => s + 1);
  };

    if (step === 3 && !d.focus.includes("finance")) { setStep(1); return; }
    setStep(s => Math.max(0, s - 1));
  };

        { id: 1, category: "finance", progress: 75, target: 100, active: true },
        { id: 2, category: "health", progress: 55, target: 100, active: true },

      <div style={{ fontSize: 12, color: T.label3, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 12, fontWeight: 600 }}>Gender</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {[{ id: "male", icon: "🧔", label: "Male" }, { id: "female", icon: "👩", label: "Female" }].map(g => (
          <button key={g.id} onClick={() => set("gender", g.id)}

            <div style={{ fontSize: 36, marginBottom: 8 }}>{g.icon}</div>
            <div style={{ fontWeight: 700, fontSize: 16, color: T.label }}>{g.label}</div>

    </div>,

    <div key="1">

      <div style={{ padding: "12px 20px 20px" }}>
        <button onClick={next} disabled={!valid[step]}
          style={{ width: "100%", padding: "16px", borderRadius: 20, background: valid[step] ? "#000" : T.bg3, color: valid[step] ? "#fff" : T.label3, border: "none", fontSize: 17, fontWeight: 700, cursor: valid[step] ? "pointer" : "default", transition: "all .2s", boxShadow: valid[step] ? "0 4px 24px rgba(0,0,0,.25)" : "none" }}>
          {step === 4 ? "Start my orbit →" : "Continue →"}
        </button>
      </div>
    </div>
  );
}

// ── BUILDERS ────────────────────────────────────────────────
function buildGoals(profile) {
  let id = 1;
  const goals = [];
  const m = profile.gender === "male";
  if (profile.focus.includes("finance")) {
    goals.push({ id: id++, category: "finance", icon: "🔒", label: "Monthly Savings", target: Math.round(profile.income * .15 / 500) * 500, progress: 0, unit: "₦" });
    goals.push({ id: id++, category: "finance", icon: "💳", label: "Debt Clearance", target: 100, progress: 0, unit: "%" });
  }
  if (profile.focus.includes("health")) {
    goals.push({ id: id++, category: "health", icon: "🏃", label: m ? "Workout sessions" : "Exercise sessions", target: 12, progress: 0, unit: "/month" });
    goals.push({ id: id++, category: "health", icon: "💧", label: "Daily Water", target: 30, progress: 0, unit: "days" });
  }
  if (profile.focus.includes("mind")) {
    goals.push({ id: id++, category: "mind", icon: "📚", label: "Read / Learn", target: 8, progress: 0, unit: "sessions" });
    goals.push({ id: id++, category: "mind", icon: "🧘", label: "Mindful days", target: 15, progress: 0, unit: "days" });
  }
  if (profile.focus.includes("connect")) {
    goals.push({ id: id++, category: "connect", icon: "☎️", label: "Call family", target: 8, progress: 0, unit: "calls" });
    goals.push({ id: id++, category: "connect", icon: "🤝", label: "Quality time", target: 4, progress: 0, unit: "occasions" });
  }
  if (profile.focus.includes("growth")) {
    goals.push({ id: id++, category: "growth", icon: "🛠️", label: "Skill hours", target: 10, progress: 0, unit: "hrs" });
    goals.push({ id: id++, category: "growth", icon: "📝", label: "Applications", target: 4, progress: 0, unit: "sent" });
  }
  return goals;
}

function buildBudget(profile) {
  const inc = profile.income;
  const m = profile.gender === "male";
  return [
    { id: "b1", catId: "savings", label: "Savings", icon: "🔒", col: "#30D158", amt: Math.round(inc * .15 / 500) * 500 },
    { id: "b2", catId: "transport", label: "Transport", icon: "🚌", col: "#35C0F6", amt: Math.round(inc * .18 / 500) * 500 },
    { id: "b3", catId: "groceries", label: "Groceries / Food", icon: "🛒", col: "#FF6AD5", amt: Math.round(inc * .20 / 500) * 500 },
    { id: "b4", catId: "family", label: "Family Support", icon: "👨‍👩‍👧", col: "#FF375F", amt: Math.round(inc * .10 / 500) * 500 },
    { id: "b5", catId: "data", label: "Data & Airtime", icon: "📱", col: "#BF5AF2", amt: Math.round(inc * .05 / 500) * 500 },

    { id: "b7", catId: "tithe", label: "Tithe", icon: "⛪", col: "#FF9F0A", amt: Math.round(inc * .10 / 500) * 500 },
    { id: "b8", catId: "emergency", label: "Emergency Fund", icon: "🛡️", col: "#30D158", amt: Math.round(inc * .07 / 500) * 500 },

  const [sheet, setSheet] = useState(null);
  const [addGoalSheet, setAddGoalSheet] = useState(false);
  const [addExpSheet, setAddExpSheet] = useState(false);
  const [addIncSheet, setAddIncSheet] = useState(false);
  const [expSearch, setExpSearch] = useState("");
  const [selCat, setSelCat] = useState(null);
  const [newExpAmt, setNewExpAmt] = useState("");
  const [newGoal, setNewGoal] = useState({ label: "", category: "finance", icon: "🎯", target: "", unit: "" });
  const [newIncLabel, setNewIncLabel] = useState("");
  const [newIncAmt, setNewIncAmt] = useState("");
  const [burstId, setBurstId] = useState(null);
  const [expanded, setExpanded] = useState(null);
  const searchRef = useRef(null);

  useEffect(() => { setTimeout(() => setLoaded(true), 80); }, []);

  const fname = profile.name.split(" ")[0];
  const pct = g => Math.min(g.progress / g.target * 100, 100);
  const active = goals.filter(g => g.active !== false);
  const totalIncome = incomeSources.reduce((s, x) => s + x.amount, 0);
  const totalExp = budget.reduce((s, b) => s + b.amt, 0);
  const remaining = totalIncome - totalExp;
  const over = totalExp > totalIncome;

  const logProgress = (id, delta) => {
    setGoals(prev => {
      const g = prev.find(x => x.id === id);
      if (!g) return prev;
      const np = Math.min(Math.max(0, g.progress + delta), g.target);
      if (g.progress < g.target && np >= g.target) { setBurstId(id); setTimeout(() => setBurstId(null), 2000); }
      return prev.map(x => x.id === id ? { ...x, progress: np } : x);
    });
  };

  const filteredCats = useMemo(() => {
    if (!expSearch.trim()) return EXPENSE_CATS;
    const q = expSearch.toLowerCase();
    return EXPENSE_CATS.filter(c => c.label.toLowerCase().includes(q) || c.group.toLowerCase().includes(q));
  }, [expSearch]);

  const grouped = useMemo(() => {
    const g = {};
    EXPENSE_CATS.forEach(c => { (g[c.group] = g[c.group] || []).push(c); });
    return g;
  }, []);

  // ── TODAY ─

          <div style={{ position: "absolute", inset: 0, background: dark ? "radial-gradient(ellipse at 50% 0%,rgba(48,209,88,.07) 0%,transparent 60%)" : "radial-gradient(ellipse at 50% 0%,rgba(48,209,88,.05) 0%,transparent 60%)" }} />

              </div>
            ))}
          </div>
        </div>

        {sTitle("Quick Log")}
        {active.map((g, i) => {
          const col = RC[g.category]?.s || RC.custom.s;
          const p = pct(g);
          return (
            <div key={g.id} onClick={() => setSheet(g)}

            <span style={{ fontSize: 10, fontWeight: tab === t.id ? 700 : 500, color: tab === t.id ? RC.finance.s : T.label2 }}>{t.label}</span>
            {tab === t.id && <div style={{ width: 18, height: 3, borderRadius: 99, background: RC.finance.s }} />}
          </button>
        ))}
      </div>

      {/* Goal detail sheet */}
      {sheet && (() => {
        const g = goals.find(x => x.id === sheet.id) || sheet;
        const col = RC[g.category]?.s || RC.custom.s;
        const p = pct(g);
        const circ = 2 * Math.PI * 44;
        const off = circ - p / 100 * circ;
        return (
          <div style={{ position: "absolute", inset: 0, zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
            <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.5)" }} onClick={() => setSheet(null)} />
            <div style={{ position: "relative", background: T.bg2, borderRadius: "26px 26px 0 0", padding: "24px 24px 32px", animation: "popIn .3s cubic-bezier(.34,1.56,.64,1)" }}>
              <div style={{ width: 40, height: 5, borderRadius: 99, background: T.bg3, margin: "0 auto 22px" }} />
              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 22 }}>
                <div style={{ position: "relative", width: 92, height: 92, flexShrink: 0 }}>
                  <svg width={92} height={92} style={{ position: "absolute", inset: 0 }}>
                    <circle cx={46} cy={46} r={44} fill="none" stroke={col} strokeOpacity=".15" strokeWidth={10} />
                    <circle cx={46} cy={46} r={44} fill="none" stroke={col} strokeWidth={10} strokeLinecap="round"
                      strokeDasharray={circ} strokeDashoffset={off} transform="rotate(-90 46 46)"
                      style={{ transition: "stroke-dashoffset 1s", filter: `drop-shadow(0 0 5px ${col}88)` }} />
                  </svg>
                  <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>{g.icon}</div>
                </div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 20, color: T.label, letterSpacing: "-.02em" }}>{g.label}</div>
                  <div style={{ fontSize: 14, color: T.label2, marginTop: 4 }}>{CAT_META[g.category]?.label} · {Math.round(p)}%</div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                <button onClick={() => logProgress(g.id, -1)} style={{ width: 54, height: 54, borderRadius: 18, background: T.bg3, border: "none", color: T.label, fontSize: 26, cursor: "pointer", fontWeight: 700 }}>−</button>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontWeight: 800, fontSize: 42, color: col, lineHeight: 1, letterSpacing: "-.03em" }}>{g.progress}</div>
                  <div style={{ fontSize: 14, color: T.label3, marginTop: 4 }}>of {g.target} {g.unit}</div>
                </div>
                <button onClick={() => logProgress(g.id, 1)} style={{ width: 54, height: 54, borderRadius: 18, background: col, border: "none", color: "#fff", fontSize: 26, cursor: "pointer", fontWeight: 700, boxShadow: `0 4px 20px ${col}55` }}>+</button>
              </div>
              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                {[1, 2, 3, 5, 10].map(s => (
                  <button key={s} onClick={() => logProgress(g.id, s)} style={{ flex: 1, padding: "11px 0", borderRadius: 12, background: col + "22", border: "none", color: col, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>+{s}</button>
                ))}
              </div>
              <button onClick={() => { setGoals(p => p.filter(x => x.id !== g.id)); setSheet(null); }} style={{ width: "100%", padding: "12px", borderRadius: 14, background: dark ? RC.health.dk : RC.health.bg, border: "none", color: RC.health.s, fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
                Remove goal
              </button>
            </div>
          </div>
        );
      })()}

      {/* Add goal sheet */}
      {addGoalSheet && (
        <div style={{ position: "absolute", inset: 0, zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
          <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.5)" }} onClick={() => setAddGoalSheet(false)} />
          <div style={{ position: "relative", background: T.bg2, borderRadius: "26px 26px 0 0", padding: "24px 24px 32px", animation: "popIn .3s cubic-bezier(.34,1.56,.64,1)", maxHeight: "80%", overflowY: "auto" }}>
            <div style={{ width: 40, height: 5, borderRadius: 99, background: T.bg3, margin: "0 auto 20px" }} />
            <div style={{ fontWeight: 800, fontSize: 20, color: T.label, marginBottom: 18 }}>New Goal</div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: T.label3, textTransform: "uppercase", letterSpacing: ".06em", fontWeight: 600, marginBottom: 8 }}>Category</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {Object.keys(RC).map(c => {
                  const sel = newGoal.category === c;
                  return <button key={c} onClick={() => setNewGoal(p => ({ ...p, category: c }))}
                    style={{ padding: "7px 14px", borderRadius: 99, border: `2px solid ${sel ? RC[c].s : T.sep}`, background: sel ? RC[c].bg : T.bg2, color: sel ? RC[c].s : T.label2, fontWeight: 600, fontSize: 12, cursor: "pointer" }}>
                    {CAT_META[c]?.icon} {CAT_META[c]?.label}
                  </button>;
                })}
              </div>
            </div>
            {[["Goal name", "text", "e.g. Save ₦50k, 20 workouts...", "label"], ["Target", "number", "e.g. 20", "target"], ["Unit", "text", "e.g. ₦, sessions, days", "unit"]].map(([lbl, type, ph, key]) => (
              <div key={key} style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: T.label3, textTransform: "uppercase", letterSpacing: ".06em", fontWeight: 600, marginBottom: 6 }}>{lbl}</div>
                <input type={type} placeholder={ph} value={newGoal[key]} onChange={e => setNewGoal(p => ({ ...p, [key]: e.target.value }))}
                  style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: `1.5px solid ${T.sep}`, background: T.bg3, color: T.label, fontSize: 15, fontFamily: "inherit", fontWeight: 600, outline: "none" }} />
              </div>
            ))}
            <button onClick={() => {
              if (!newGoal.label || !newGoal.target) return;
              setGoals(p => [...p, { id: Date.now(), category: newGoal.category, icon: CAT_META[newGoal.category]?.icon || "🎯", label: newGoal.label, target: parseInt(newGoal.target) || 10, progress: 0, unit: newGoal.unit || "", active: true }]);
              setNewGoal({ label: "", category: "finance", icon: "🎯", target: "", unit: "" });
              setAddGoalSheet(false);
            }} style={{ width: "100%", padding: "15px", borderRadius: 18, background: newGoal.label && newGoal.target ? "#000" : T.bg3, color: newGoal.label && newGoal.target ? "#fff" : T.label3, border: "none", fontWeight: 700, fontSize: 16, cursor: "pointer", marginTop: 4 }}>
              Create Goal
            </button>
          </div>
        </div>
      )}

      {/* Add expense sheet */}
      {addExpSheet && (
        <div style={{ position: "absolute", inset: 0, zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
          <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.5)" }} onClick={() => { setAddExpSheet(false); setSelCat(null); setExpSearch(""); setNewExpAmt(""); }} />
          <div style={{ position: "relative", background: T.bg2, borderRadius: "26px 26px 0 0", maxHeight: "88%", display: "flex", flexDirection: "column", animation: "popIn .3s cubic-bezier(.34,1.56,.64,1)" }}>
            <div style={{ padding: "20px 20px 12px", borderBottom: `1px solid ${T.sep}` }}>
              <div style={{ width: 40, height: 5, borderRadius: 99, background: T.bg3, margin: "0 auto 16px" }} />
              <div style={{ fontWeight: 800, fontSize: 20, color: T.label, marginBottom: 12 }}>Add Expense</div>
              <div style={{ position: "relative" }}>
                <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", fontSize: 15 }}>🔍</span>
                <input ref={searchRef} value={expSearch} onChange={e => { setExpSearch(e.target.value); setSelCat(null); }} placeholder="Search categories..."
                  style={{ width: "100%", padding: "13px 13px 13px 42px", borderRadius: 14, border: `1.5px solid ${T.sep}`, background: T.bg3, color: T.label, fontSize: 15, fontFamily: "inherit", outline: "none" }} />
              </div>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "12px 20px" }}>
              {!selCat ? (
                expSearch.trim() ? (
                  <div>
                    {filteredCats.length === 0 && <div style={{ textAlign: "center", padding: "32px 0", color: T.label3, fontSize: 14 }}>No matches</div>}
                    {filteredCats.map(cat => (
                      <button key={cat.id} onClick={() => setSelCat(cat)}
                        style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "11px 14px", borderRadius: 14, background: T.bg2, border: `1px solid ${T.sep}`, cursor: "pointer", marginBottom: 6, textAlign: "left" }}>
                        <div style={{ width: 36, height: 36, borderRadius: 11, background: cat.col + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{cat.icon}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: 14, color: T.label }}>{cat.label}</div>
                          <div style={{ fontSize: 11, color: T.label3 }}>{cat.group}</div>
                        </div>
                        <span style={{ color: T.label3 }}>→</span>
                      </button>
                    ))}
                  </div>
                ) : (
                  Object.entries(grouped).map(([group, cats]) => (
                    <div key={group} style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: T.label3, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 8, paddingLeft: 4 }}>{group}</div>
                      <div style={{ background: T.bg2, borderRadius: 18, overflow: "hidden", border: `1px solid ${T.sep}` }}>
                        {cats.map((cat, j) => (
                          <button key={cat.id} onClick={() => setSelCat(cat)}
                            style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "11px 14px", background: "transparent", border: "none", borderBottom: j < cats.length - 1 ? `1px solid ${T.sep}` : "none", cursor: "pointer", textAlign: "left" }}>
                            <div style={{ width: 32, height: 32, borderRadius: 10, background: cat.col + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>{cat.icon}</div>
                            <span style={{ fontWeight: 600, fontSize: 14, color: T.label, flex: 1 }}>{cat.label}</span>
                            <span style={{ color: T.label3, fontSize: 12 }}>→</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  ))
                )
              ) : (
                <div>
                  <button onClick={() => setSelCat(null)} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: RC.mind.s, fontWeight: 600, fontSize: 14, cursor: "pointer", marginBottom: 20, padding: 0 }}>← Back</button>
                  <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 22 }}>
                    <div style={{ width: 54, height: 54, borderRadius: 18, background: selCat.col + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>{selCat.icon}</div>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: 20, color: T.label }}>{selCat.label}</div>
                      <div style={{ fontSize: 13, color: T.label2 }}>{selCat.group}</div>
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: T.label3, textTransform: "uppercase", letterSpacing: ".06em", fontWeight: 600, marginBottom: 8 }}>Monthly amount</div>
                  <div style={{ position: "relative", marginBottom: 14 }}>
                    <span style={{ position: "absolute", left: 16, top: "50%", transform: "translateY(-50%)", fontSize: 22, fontWeight: 700, color: selCat.col }}>₦</span>
                    <input type="tel" inputMode="numeric" autoFocus value={newExpAmt} placeholder="0"
                      onChange={e => { const r = e.target.value.replace(/\D/g, ""); setNewExpAmt(r ? parseInt(r).toLocaleString() : ""); }}
                      style={{ width: "100%", padding: "14px 14px 14px 48px", borderRadius: 14, border: `1.5px solid ${newExpAmt ? selCat.col : T.sep}`, background: T.bg3, color: T.label, fontSize: 26, fontWeight: 800, fontFamily: "inherit", outline: "none" }} />
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
                    {[5000, 10000, 15000, 20000, 30000, 50000].map(a => (
                      <button key={a} onClick={() => setNewExpAmt(a.toLocaleString())}
                        style={{ padding: "7px 14px", borderRadius: 99, border: `1.5px solid ${newExpAmt === a.toLocaleString() ? selCat.col : T.sep}`, background: newExpAmt === a.toLocaleString() ? selCat.col + "22" : "transparent", color: newExpAmt === a.toLocaleString() ? selCat.col : T.label2, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                        ₦{a.toLocaleString()}
                      </button>
                    ))}
                  </div>
                  <button onClick={() => {
                    if (!newExpAmt) return;
                    setBudget(p => [...p, { id: "b" + Date.now(), catId: selCat.id, label: selCat.label, icon: selCat.icon, col: selCat.col, amt: parseInt(newExpAmt.replace(/,/g, "")) || 0 }]);
                    setNewExpAmt(""); setSelCat(null); setExpSearch(""); setAddExpSheet(false);
                  }} style={{ width: "100%", padding: "15px", borderRadius: 18, background: newExpAmt ? "#000" : T.bg3, color: newExpAmt ? "#fff" : T.label3, border: "none", fontWeight: 700, fontSize: 17, cursor: newExpAmt ? "pointer" : "default" }}>
                    Add {selCat.label}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Add income sheet */}
      {addIncSheet && (
        <div style={{ position: "absolute", inset: 0, zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
          <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.5)" }} onClick={() => { setAddIncSheet(false); setNewIncLabel(""); setNewIncAmt(""); }} />
          <div style={{ position: "relative", background: T.bg2, borderRadius: "26px 26px 0 0", padding: "24px 24px 32px", animation: "popIn .3s cubic-bezier(.34,1.56,.64,1)", maxHeight: "80%", overflowY: "auto" }}>
            <div style={{ width: 40, height: 5, borderRadius: 99, background: T.bg3, margin: "0 auto 20px" }} />
            <div style={{ fontWeight: 800, fontSize: 20, color: T.label, marginBottom: 18 }}>Add Income Source</div>
            {[["Source name", "text", "e.g. Side hustle, Rental...", "label"], ["Monthly amount (₦)", "number", "0", "amt"]].map(([lbl, type, ph, key]) => (
              <div key={key} style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, color: T.label3, textTransform: "uppercase", letterSpacing: ".06em", fontWeight: 600, marginBottom: 6 }}>{lbl}</div>
                <input type={type} placeholder={ph} value={key === "label" ? newIncLabel : newIncAmt}
                  onChange={e => { if (key === "label") setNewIncLabel(e.target.value); else { const r = e.target.value.replace(/\D/g, ""); setNewIncAmt(r ? parseInt(r).toLocaleString() : ""); } }}
                  style={{ width: "100%", padding: "13px 14px", borderRadius: 12, border: `1.5px solid ${T.sep}`, background: T.bg3, color: T.label, fontSize: 16, fontFamily: "inherit", fontWeight: 600, outline: "none" }} />
              </div>
            ))}
            <button onClick={() => {
              if (!newIncLabel || !newIncAmt) return;
              setIncomeSources(p => [...p, { id: "inc_" + Date.now(), label: newIncLabel, icon: "💵", amount: parseInt(newIncAmt.replace(/,/g, "")) || 0 }]);
              setNewIncLabel(""); setNewIncAmt(""); setAddIncSheet(false);
            }} style={{ width: "100%", padding: "15px", borderRadius: 18, background: newIncLabel && newIncAmt ? "#000" : T.bg3, color: newIncLabel && newIncAmt ? "#fff" : T.label3, border: "none", fontWeight: 700, fontSize: 16, cursor: "pointer", marginTop: 4 }}>
              Add Income Source
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT ────────────────────────────────────────────────────
function Root() {
  const [dark, setDark] = useState(false);
  const toggle = useCallback(() => setDark(d => !d), []);
  const T = dark ? DARK : LIGHT;
  const [screen, setScreen] = useState("onboard");
  const [profile, setProfile] = useState(null);
  const [goals, setGoals] = useState(null);
  const [budget, setBudget] = useState(null);

  useEffect(() => {
    document.body.style.background = dark ? "#000" : "#F2F2F7";
  }, [dark]);

  return (
    <ThemeCtx.Provider value={{ dark, toggle, T }}>
      <style>{`
        @keyframes popIn{0%{transform:scale(.9);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
        *{box-sizing:border-box;-webkit-font-smoothing:antialiased}
        button{font-family:inherit}
        input{font-family:inherit}
        ::-webkit-scrollbar{display:none}
      `}</style>
      <div style={{ height: "100%", color: T.label, fontFamily: "'Plus Jakarta Sans', system-ui, sans-serif", position: "relative", overflow: "hidden", background: T.bg }}>
        {screen === "onboard" && (
          <Onboarding onComplete={(p, g, b) => { setProfile(p); setGoals(g); setBudget(b); setScreen("app"); }} />
        )}
        {screen === "app" && profile && goals && budget && (
          <Dashboard profile={profile} goals={goals} budget={budget} />
        )}
      </div>
    </ThemeCtx.Provider>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);

</script>
</body>
</html>
